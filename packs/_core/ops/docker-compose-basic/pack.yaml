pack: "docker-compose-basic"
version: "0.1"
tools:
  - name: "docker-compose"
    kind: "cli"
    binary: "docker"
    operations:
      - name: "config"
        args: ["compose", "-f", "{{file}}", "config"]
        params:
          file: {type: "string", required: true}
      - name: "ps"
        args: ["compose", "-f", "{{file}}", "ps"]
        params:
          file: {type: "string", required: true}
      - name: "up-service"
        args: ["compose", "-f", "{{file}}", "up", "-d", "{{service}}"]
        params:
          file: {type: "string", required: true}
          service: {type: "string", required: true}
      - name: "restart-service"
        args: ["compose", "-f", "{{file}}", "restart", "{{service}}"]
        params:
          file: {type: "string", required: true}
          service: {type: "string", required: true}

