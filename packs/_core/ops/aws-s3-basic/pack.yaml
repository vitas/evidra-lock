pack: "aws-s3-basic"
version: "0.1"
tools:
  - name: "aws"
    kind: "cli"
    binary: "aws"
    operations:
      - name: "s3-ls"
        args: ["s3", "ls", "{{uri}}"]
        params:
          uri: {type: "string", required: true}
      - name: "s3-rm-object"
        args: ["s3", "rm", "{{uri}}"]
        params:
          uri: {type: "string", required: true}
      - name: "s3-rm-recursive"
        args: ["s3", "rm", "{{uri}}", "--recursive"]
        params:
          uri: {type: "string", required: true}
