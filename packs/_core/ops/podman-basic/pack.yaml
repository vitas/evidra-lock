pack: "podman-basic"
version: "0.1"
tools:
  - name: "podman"
    kind: "cli"
    binary: "podman"
    operations:
      - name: "images"
        args: ["images"]
        params: {}
      - name: "tag"
        args: ["tag", "{{source}}", "{{target}}"]
        params:
          source: {type: "string", required: true}
          target: {type: "string", required: true}
      - name: "push"
        args: ["push", "{{image}}", "{{destination?}}"]
        params:
          image: {type: "string", required: true}
          destination: {type: "string", required: false}

