pack: "docker-basic"
version: "0.1"
tools:
  - name: "docker"
    kind: "cli"
    binary: "docker"
    operations:
      - name: "images"
        args: ["images"]
        params: {}
      - name: "tag"
        args: ["tag", "{{source}}", "{{target}}"]
        params:
          source: {type: "string", required: true}
          target: {type: "string", required: true}
      - name: "push"
        args: ["push", "{{image}}"]
        params:
          image: {type: "string", required: true}

