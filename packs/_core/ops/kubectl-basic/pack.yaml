pack: "kubectl-basic"
version: "0.1"
tools:
  - name: "kubectl"
    kind: "cli"
    binary: "kubectl"
    operations:
      - name: "get"
        args: ["get", "{{resource}}", "-n", "{{namespace}}"]
        params:
          resource: {type: "string", required: true}
          namespace: {type: "string", required: true}
      - name: "apply"
        args: ["apply", "-f", "{{file}}", "-n", "{{namespace}}"]
        params:
          file: {type: "string", required: true}
          namespace: {type: "string", required: true}
      - name: "delete"
        args: ["delete", "{{resource}}", "{{name}}", "-n", "{{namespace}}"]
        params:
          resource: {type: "string", required: true}
          name: {type: "string", required: true}
          namespace: {type: "string", required: true}

