version: 2

project_name: evidra

before:
  hooks:
    - go mod tidy

builds:
  - id: evidra
    main: ./cmd/evidra
    binary: evidra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X samebits.com/evidra/pkg/version.Version={{.Version}}
      - -X samebits.com/evidra/pkg/version.Commit={{.Commit}}
      - -X samebits.com/evidra/pkg/version.Date={{.Date}}

archives:
  - id: evidra
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
