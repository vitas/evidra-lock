version: 2

project_name: evidra

before:
  hooks:
    - go mod tidy

builds:
  - id: evidra
    main: ./cmd/evidra
    binary: evidra-lock
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X samebits.com/evidra/pkg/version.Version={{.Version}}
      - -X samebits.com/evidra/pkg/version.Commit={{.Commit}}
      - -X samebits.com/evidra/pkg/version.Date={{.Date}}

  - id: evidra-mcp
    main: ./cmd/evidra-mcp
    binary: evidra-lock-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X samebits.com/evidra/pkg/version.Version={{.Version}}
      - -X samebits.com/evidra/pkg/version.Commit={{.Commit}}
      - -X samebits.com/evidra/pkg/version.Date={{.Date}}

  - id: evidra-api
    main: ./cmd/evidra-api
    binary: evidra-lock-api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X samebits.com/evidra/pkg/version.Version={{.Version}}
      - -X samebits.com/evidra/pkg/version.Commit={{.Commit}}
      - -X samebits.com/evidra/pkg/version.Date={{.Date}}

archives:
  - id: evidra-mcp
    builds:
      - evidra-mcp
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "evidra-lock-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: evidra
    builds:
      - evidra
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "evidra-lock_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: evidra-api
    builds:
      - evidra-api
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "evidra-lock-api_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  mode: replace

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc

brews:
  - name: evidra-lock-mcp
    ids:
      - evidra-mcp
    skip_upload: false
    repository:
      owner: samebits
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/vitas/evidra-lock"
    description: "Evidra-Lock is a kill-switch for AI agents managing infrastructure."
    license: "Apache-2.0"
    install: |
      bin.install "evidra-lock-mcp"
    test: |
      system bin/"evidra-lock-mcp", "--version"
