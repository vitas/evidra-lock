name: Publish API image

# Rebuilds and pushes ghcr.io/vitas/evidra-api:latest on every push to main.
# Tag releases are handled by release.yml (docker-api job).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (smoke tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          load: true
          tags: evidra-api:smoke

      - name: Smoke test
        run: |
          API_KEY="test-key-at-least-32-characters-long"

          docker run -d --name evidra-api-smoke \
            -p 8080:8080 \
            -e EVIDRA_ENV=development \
            -e EVIDRA_API_KEY="$API_KEY" \
            -e LOG_FORMAT=text \
            evidra-api:smoke

          # Wait for server to be ready
          for _ in $(seq 1 10); do
            if curl -sf http://localhost:8080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Health check
          curl -sf http://localhost:8080/healthz \
            || { echo "FAIL: /healthz not reachable"; docker logs evidra-api-smoke; exit 1; }
          echo "PASS: /healthz ok"

          # UI root — must return 200 text/html (embedded UI)
          UI_CT=$(curl -sf -o /dev/null -w "%{content_type}" http://localhost:8080/)
          echo "$UI_CT" | grep -q "text/html" \
            || { echo "FAIL: GET / content-type not text/html (got: $UI_CT)"; docker logs evidra-api-smoke; exit 1; }
          echo "PASS: GET / returns text/html"

          # Public key endpoint
          curl -sf http://localhost:8080/v1/evidence/pubkey | grep -q "PUBLIC KEY" \
            || { echo "FAIL: /v1/evidence/pubkey missing PEM"; exit 1; }
          echo "PASS: /v1/evidence/pubkey ok"

          # Validate endpoint
          RESP=$(curl -sf -X POST http://localhost:8080/v1/validate \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"actor":{"type":"agent","id":"claude","origin":"cli"},"tool":"kubectl","operation":"apply","params":{"target":{"namespace":"default"}}}')

          echo "$RESP" | grep -q '"allow"' \
            || { echo "FAIL: response missing allow field"; echo "$RESP"; exit 1; }
          echo "$RESP" | grep -q '"signature"' \
            || { echo "FAIL: response missing signature"; echo "$RESP"; exit 1; }
          echo "PASS: /v1/validate returns signed response"

          docker stop evidra-api-smoke
          docker rm evidra-api-smoke

      - name: Push image (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64
          tags: ghcr.io/vitas/evidra-lock-api:latest
