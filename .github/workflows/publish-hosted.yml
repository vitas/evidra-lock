name: Publish hosted MCP image

# Rebuilds and pushes ghcr.io/vitas/evidra-mcp-hosted:latest on every push to main.
# Tag releases are handled by release.yml (docker-hosted job).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-hosted:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (smoke tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hosted
          load: true
          tags: evidra-mcp-hosted:smoke

      - name: Smoke test
        run: |
          docker run -d --name hosted-smoke \
            -p 8000:8000 \
            evidra-mcp-hosted:smoke

          # Wait for supergateway + evidra-mcp to be ready
          ok=0
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/healthz >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "FAIL: /healthz not reachable after 30s"
            docker logs hosted-smoke
            exit 1
          fi
          echo "PASS: /healthz ok"

          docker stop hosted-smoke
          docker rm hosted-smoke

      - name: Push image (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hosted
          push: true
          platforms: linux/amd64
          tags: ghcr.io/vitas/evidra-mcp-hosted:latest
