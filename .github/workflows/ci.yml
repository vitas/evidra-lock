name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go toolchain info
        run: |
          echo "go version:   $(go version)"
          echo "GOVERSION:    $(go env GOVERSION)"
          echo "GOMOD:        $(go env GOMOD)"

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run race tests (linux)
        run: go test -race ./...

      - name: Validate demo examples
        run: |
          go build -o bin/evidra ./cmd/evidra
          bin/evidra validate examples/demo/kubernetes_kube_system_delete.json && exit 1 || test $? -eq 2
          bin/evidra validate examples/demo/terraform_public_s3.json && exit 1 || test $? -eq 2
          bin/evidra validate examples/demo/kubernetes_safe_apply.json

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m
