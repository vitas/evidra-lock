name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Guard: tag format + repo version alignment ───────────────────
  release-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and version alignment
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF:-}" != refs/tags/* ]]; then
            echo "::error::Release workflow must run from a tag ref (refs/tags/vX.Y.Z). Current ref: ${GITHUB_REF:-<unset>}"
            exit 1
          fi

          tag="${GITHUB_REF#refs/tags/}"
          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag '${tag}'. Expected semver like v0.1.24 or v0.1.24-rc1."
            exit 1
          fi

          tag_sha="$(git rev-list -n1 "${tag}")"
          if [ "${tag_sha}" != "${GITHUB_SHA}" ]; then
            echo "::error::Tag ${tag} points to ${tag_sha}, but workflow SHA is ${GITHUB_SHA}."
            exit 1
          fi

          repo_version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "${repo_version}" ]; then
            echo "::error::VERSION file is empty."
            exit 1
          fi

          code_version="$(sed -nE 's/^[[:space:]]*Version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' pkg/version/version.go | head -n1)"
          if [ -z "${code_version}" ]; then
            echo "::error::Could not parse Version constant from pkg/version/version.go."
            exit 1
          fi

          tag_mm="$(echo "${tag#v}" | cut -d. -f1-2)"
          repo_mm="$(echo "${repo_version}" | sed -E 's/^([0-9]+)\.([0-9]+).*/\1.\2/')"
          code_mm="$(echo "${code_version}" | sed -E 's/^([0-9]+)\.([0-9]+).*/\1.\2/')"

          if [ "${repo_mm}" != "${tag_mm}" ]; then
            echo "::error::Tag ${tag} is ${tag_mm}, but VERSION baseline is ${repo_version}."
            echo "::error::Update VERSION before releasing a new major/minor line."
            exit 1
          fi

          if [ "${code_mm}" != "${tag_mm}" ]; then
            echo "::error::Tag ${tag} is ${tag_mm}, but pkg/version baseline is ${code_version}."
            echo "::error::Update pkg/version/version.go before releasing a new major/minor line."
            exit 1
          fi

          echo "Release guard passed for ${tag} (VERSION=${repo_version}, code=${code_version})."

  # ── Gate: tests must pass before any release job runs ───────────
  test:
    needs: [release-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run OPA policy tests
        run: opa test policy/bundles/ops-v0.1/ -v

      - name: Run race tests
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: --timeout=5m

  # ── Snapshot dry-run (validates GoReleaser config) ──────────────
  snapshot:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go toolchain info
        run: |
          echo "go version:   $(go version)"
          echo "GOVERSION:    $(go env GOVERSION)"
          echo "GOMOD:        $(go env GOMOD)"

      - name: GoReleaser snapshot (dry run)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker image ───────────────────────────────────────────────
  docker:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vitas/evidra-lock-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: evidra-lock-mcp:smoke

      - name: Smoke test
        run: |
          { cat cmd/evidra-mcp/test/testdata/init.jsonl \
               cmd/evidra-mcp/test/testdata/validate_pass.jsonl; sleep 2; } \
            | timeout 10 docker run --rm -i evidra-lock-mcp:smoke \
              >stdout.log 2>stderr.log || true

          echo "--- stderr ---"
          cat stderr.log

          grep -q "using built-in ops-v0.1 bundle" stderr.log \
            || { echo "FAIL: missing embedded bundle notice"; exit 1; }

          grep '"id":2' stdout.log | grep -q '"allow"' \
            || { echo "FAIL: response missing allow field"; cat stdout.log; exit 1; }

          echo "PASS: smoke test ok"

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Docker image (evidra-api) ──────────────────────────────────
  docker-api:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vitas/evidra-lock-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          load: true
          tags: evidra-lock-api:smoke

      - name: Smoke test
        run: |
          API_KEY="test-key-at-least-32-characters-long"

          docker run -d --name evidra-lock-api-smoke \
            -p 8080:8080 \
            -e EVIDRA_ENV=development \
            -e EVIDRA_API_KEY="$API_KEY" \
            -e LOG_FORMAT=text \
            evidra-lock-api:smoke

          # Wait for server to be ready
          for _ in $(seq 1 10); do
            if curl -sf http://localhost:8080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Health check
          curl -sf http://localhost:8080/healthz \
            || { echo "FAIL: /healthz not reachable"; docker logs evidra-lock-api-smoke; exit 1; }
          echo "PASS: /healthz ok"

          # UI root — must return 200 text/html (embedded UI)
          UI_CT=$(curl -sf -o /dev/null -w "%{content_type}" http://localhost:8080/)
          echo "$UI_CT" | grep -q "text/html" \
            || { echo "FAIL: GET / content-type not text/html (got: $UI_CT)"; docker logs evidra-lock-api-smoke; exit 1; }
          echo "PASS: GET / returns text/html"

          # Public key endpoint
          curl -sf http://localhost:8080/v1/evidence/pubkey | grep -q "PUBLIC KEY" \
            || { echo "FAIL: /v1/evidence/pubkey missing PEM"; exit 1; }
          echo "PASS: /v1/evidence/pubkey ok"

          # Validate endpoint
          RESP=$(curl -sf -X POST http://localhost:8080/v1/validate \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"actor":{"type":"agent","id":"claude","origin":"cli"},"tool":"kubectl","operation":"apply","params":{"target":{"namespace":"default"}}}')

          echo "$RESP" | grep -q '"allow"' \
            || { echo "FAIL: response missing allow field"; echo "$RESP"; exit 1; }
          echo "$RESP" | grep -q '"signature"' \
            || { echo "FAIL: response missing signature"; echo "$RESP"; exit 1; }
          echo "PASS: /v1/validate returns signed response"

          docker stop evidra-lock-api-smoke
          docker rm evidra-lock-api-smoke

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Docker image (evidra-mcp-hosted) ──────────────────────────
  docker-hosted:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vitas/evidra-lock-mcp-hosted
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hosted
          load: true
          tags: evidra-lock-mcp-hosted:smoke

      - name: Smoke test
        run: |
          docker run -d --name hosted-smoke \
            -p 8000:8000 \
            evidra-lock-mcp-hosted:smoke

          ok=0
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/healthz >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "FAIL: /healthz not reachable after 30s"
            docker logs hosted-smoke
            exit 1
          fi
          echo "PASS: /healthz ok"

          docker stop hosted-smoke
          docker rm hosted-smoke

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hosted
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── GoReleaser (GitHub Release + Homebrew formula) ─────────────
  goreleaser:
    needs: [snapshot]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go toolchain info
        run: |
          echo "go version:   $(go version)"
          echo "GOVERSION:    $(go env GOVERSION)"
          echo "GOMOD:        $(go env GOMOD)"

      - name: Verify Homebrew tap token access
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret."
            exit 1
          fi

          repo_url="https://api.github.com/repos/samebits/homebrew-tap"
          repo_code=$(curl -sS -o /tmp/homebrew_tap_repo.json -w "%{http_code}" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${repo_url}")
          if [ "${repo_code}" != "200" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot access samebits/homebrew-tap (HTTP ${repo_code})."
            echo "::error::Grant token access to samebits/homebrew-tap with Contents: Read and write, then update the secret."
            cat /tmp/homebrew_tap_repo.json || true
            exit 1
          fi

          default_branch=$(jq -r '.default_branch // empty' /tmp/homebrew_tap_repo.json)
          if [ -z "${default_branch}" ]; then
            echo "::error::Could not determine default branch for samebits/homebrew-tap."
            cat /tmp/homebrew_tap_repo.json || true
            exit 1
          fi

          branch_url="${repo_url}/branches/${default_branch}"
          branch_code=$(curl -sS -o /tmp/homebrew_tap_branch.json -w "%{http_code}" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${branch_url}")
          if [ "${branch_code}" != "200" ]; then
            echo "::error::samebits/homebrew-tap ${default_branch} branch is not accessible with HOMEBREW_TAP_TOKEN (HTTP ${branch_code})."
            cat /tmp/homebrew_tap_branch.json || true
            exit 1
          fi
          echo "Homebrew tap token preflight passed: samebits/homebrew-tap (${default_branch}) is reachable."

      - name: Reset existing GitHub release for tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "${tag}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Existing release found for ${tag}; deleting it to avoid duplicate asset upload failures."
            gh release delete "${tag}" -R "${GITHUB_REPOSITORY}" --yes
          else
            echo "No existing release for ${tag}; continuing."
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
