name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Snapshot dry-run (validates GoReleaser config) ──────────────
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go toolchain info
        run: |
          echo "go version:   $(go version)"
          echo "GOVERSION:    $(go env GOVERSION)"
          echo "GOMOD:        $(go env GOMOD)"

      - name: GoReleaser snapshot (dry run)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker image ───────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vitas/evidra-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: evidra-mcp:smoke

      - name: Smoke test
        run: |
          { cat cmd/evidra-mcp/test/testdata/init.jsonl \
               cmd/evidra-mcp/test/testdata/validate_pass.jsonl; sleep 2; } \
            | timeout 10 docker run --rm -i evidra-mcp:smoke \
              >stdout.log 2>stderr.log || true

          echo "--- stderr ---"
          cat stderr.log

          grep -q "using built-in ops-v0.1 bundle" stderr.log \
            || { echo "FAIL: missing embedded bundle notice"; exit 1; }

          grep '"id":2' stdout.log | grep -q '"allow"' \
            || { echo "FAIL: response missing allow field"; cat stdout.log; exit 1; }

          echo "PASS: smoke test ok"

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Docker image (evidra-api) ──────────────────────────────────
  docker-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vitas/evidra-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          load: true
          tags: evidra-api:smoke

      - name: Smoke test
        run: |
          API_KEY="test-key-at-least-32-characters-long"

          docker run -d --name evidra-api-smoke \
            -p 8080:8080 \
            -e EVIDRA_ENV=development \
            -e EVIDRA_API_KEY="$API_KEY" \
            -e LOG_FORMAT=text \
            evidra-api:smoke

          # Wait for server to be ready
          for _ in $(seq 1 10); do
            if curl -sf http://localhost:8080/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Health check
          curl -sf http://localhost:8080/healthz \
            || { echo "FAIL: /healthz not reachable"; docker logs evidra-api-smoke; exit 1; }
          echo "PASS: /healthz ok"

          # Public key endpoint
          curl -sf http://localhost:8080/v1/evidence/pubkey | grep -q "PUBLIC KEY" \
            || { echo "FAIL: /v1/evidence/pubkey missing PEM"; exit 1; }
          echo "PASS: /v1/evidence/pubkey ok"

          # Validate endpoint
          RESP=$(curl -sf -X POST http://localhost:8080/v1/validate \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"actor":{"type":"agent","id":"claude","origin":"cli"},"tool":"kubectl","operation":"apply","params":{"target":{"namespace":"default"}}}')

          echo "$RESP" | grep -q '"allow"' \
            || { echo "FAIL: response missing allow field"; echo "$RESP"; exit 1; }
          echo "$RESP" | grep -q '"signature"' \
            || { echo "FAIL: response missing signature"; echo "$RESP"; exit 1; }
          echo "PASS: /v1/validate returns signed response"

          docker stop evidra-api-smoke
          docker rm evidra-api-smoke

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── GoReleaser (GitHub Release + Homebrew formula) ─────────────
  goreleaser:
    needs: [snapshot]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go toolchain info
        run: |
          echo "go version:   $(go version)"
          echo "GOVERSION:    $(go env GOVERSION)"
          echo "GOMOD:        $(go env GOMOD)"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
