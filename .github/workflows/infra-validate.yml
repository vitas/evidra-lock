name: Validate Infrastructure
on:
  pull_request:
    paths: ['terraform/**']

env:
  # Pin adapter version — update manually when upgrading
  ADAPTER_VERSION: v0.0.2

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"

      - name: Terraform Init & Plan
        working-directory: terraform
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          terraform init -input=false
          terraform plan -input=false -out=tfplan.bin
          terraform show -json tfplan.bin > tfplan.json

      - name: Install Evidra Adapter
        run: |
          set -euo pipefail
          ARCHIVE="evidra-adapter-terraform_${ADAPTER_VERSION}_linux_amd64.tar.gz"
          URL="https://github.com/evidra/adapters/releases/download/${ADAPTER_VERSION}/${ARCHIVE}"

          echo "Downloading ${URL}"
          curl -fsSL "${URL}" -o /tmp/adapter.tar.gz

          # Verify checksum
          CHECKSUMS_URL="https://github.com/evidra/adapters/releases/download/${ADAPTER_VERSION}/checksums.txt"
          curl -fsSL "${CHECKSUMS_URL}" -o /tmp/checksums.txt
          EXPECTED=$(grep "${ARCHIVE}" /tmp/checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/adapter.tar.gz | awk '{print $1}')
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "::error::Checksum mismatch for ${ARCHIVE}"
            echo "  Expected: ${EXPECTED}"
            echo "  Actual:   ${ACTUAL}"
            exit 1
          fi

          tar xzf /tmp/adapter.tar.gz -C /usr/local/bin evidra-adapter-terraform
          evidra-adapter-terraform --version

      - name: Evidra Policy Check
        env:
          EVIDRA_API_KEY: ${{ secrets.EVIDRA_API_KEY }}
          EVIDRA_URL: ${{ vars.EVIDRA_URL || 'https://evidra.rest' }}
        run: |
          set -euo pipefail
          RESULT=$(evidra-adapter-terraform --json-errors < terraform/tfplan.json)

          # Extract input payload (what the skill evaluates)
          PAYLOAD=$(echo "${RESULT}" | jq -r '.input')

          # Log summary
          echo "### Terraform Plan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "${PAYLOAD}" | jq -r '"- Total changes: \(.total_changes)\n- Creates: \(.create_count)\n- Updates: \(.update_count)\n- Destroys: \(.destroy_count)\n- Replaces: \(.replace_count)"' >> "$GITHUB_STEP_SUMMARY"

          # POST to Evidra validate endpoint
          HTTP_CODE=$(curl -s -o /tmp/evidra_response.json -w "%{http_code}" \
            -X POST "${EVIDRA_URL}/v1/validate" \
            -H "Authorization: Bearer ${EVIDRA_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          echo "Evidra response (HTTP ${HTTP_CODE}):"
          jq . /tmp/evidra_response.json

          # Append policy result to step summary
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Policy Result" >> "$GITHUB_STEP_SUMMARY"
          jq -r '"- Allowed: \(.allow)\n- Risk level: \(.risk_level)\n- Reason: \(.reason)"' /tmp/evidra_response.json >> "$GITHUB_STEP_SUMMARY" || true

          # Fail the step if policy denied or API error
          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "::error::Evidra API returned HTTP ${HTTP_CODE}"
            exit 1
          fi

          ALLOWED=$(jq -r '.allow' /tmp/evidra_response.json)
          if [ "${ALLOWED}" = "false" ]; then
            REASON=$(jq -r '.reason // "Policy denied"' /tmp/evidra_response.json)
            echo "::error::Policy denied: ${REASON}"
            exit 1
          fi

          echo "✅ Policy check passed"
